<div class="container" id="i18_projects">
    <div class="row m-b-lg">
        <div class="col-lg-12 text-center">
            <div class="navy-line"></div>
            <h1><span data-i18n="projects.my_projects">My Projects</span></h1>
        </div>
    </div>
    <div class="row">
        {% for project in site.data.projects %}
            {% assign loopindex = forloop.index | modulo: 2 %}
            <div class="col-sm-6 wow {% if loopindex == 1 %} fadeInLeft {% else %} fadeInRight {% endif %}">
              <div class="team-member project-card" role="button" tabindex="0" aria-label="Open project details">
                  <img src="{{ project.img | prepend: site.baseurl }}" class="img-responsive img-circle img-small" alt="">
                  <h4><span class="navy" data-i18n="projects.{{ project.name.i18n }}"> {{ project.name.detail }} </span></h4>
                  <p><span data-i18n="projects.{{ project.desc.i18n }}"> {{ project.desc.detail }} </span></p>
                  <span class="project-detail-text" style="display:none;" data-i18n="projects.{{ project.desc.i18n }}_detail"></span>
                  {% if project.repo %}
                  <a target="_blank" style="width: 65px;" href="http://blockbuilder.org/OrhanYaz/e62bfeb55a24e17f7384fea1e038c4d3"  class="btn btn-white btn-xs fork"><i class="fa fa-balance-scale"></i> </a>&emsp;
                  <a target="_blank" style="width: 65px;" href="http://blockbuilder.org/OrhanYaz/73b0cec8ad9dc9195f7d7a375bb9382a" class="btn btn-white btn-xs fork"><i class="fa fa-medkit"></i> </a>&emsp;
                  <a target="_blank" style="width: 65px;" href="https://orhanyaz.github.io/2015-french-ligue-1-ranking/" class="btn btn-white btn-xs fork"><i class="fa fa-soccer-ball-o"></i> </a>
                  {% endif %}
                  {% if project.repo_k %}
                  <a target="_blank" style="width: 65px;" href="https://www.kaggle.com/meryem69"  class="btn btn-white btn-xs fork"><i class="fa fa-bar-chart"></i> </a>&emsp;
                  {% endif %}
                </div>
          </div>
          {% if forloop.index | modulo: 2 == 0 %}
          <div class="clearfix visible-sm-block visible-md-block visible-lg-block"></div>
          {% endif %}
      {% endfor %}
    </div>

    <div class="modal fade" id="projectDetailModal" tabindex="-1" role="dialog" aria-labelledby="projectDetailTitle">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            <h4 class="modal-title" id="projectDetailTitle"></h4>
          </div>
          <div class="modal-body">
            <p id="projectDetailBody"></p>
          </div>
        </div>
      </div>
    </div>
</div>
<br>

<script>
  (function () {
    function getDetailText(card) {
      var detailSpan = card.querySelector('.project-detail-text');
      if (detailSpan && detailSpan.textContent.trim()) return detailSpan.textContent.trim();
      var descSpan = card.querySelector('p span[data-i18n]');
      return descSpan ? descSpan.textContent.trim() : '';
    }

    function openProjectModal(card) {
      var titleSpan = card.querySelector('h4 span[data-i18n]');
      var title = titleSpan ? titleSpan.textContent.trim() : '';
      var details = getDetailText(card);
      document.getElementById('projectDetailTitle').textContent = title;
      document.getElementById('projectDetailBody').textContent = details;
      $('#projectDetailModal').modal('show');
    }

    $('.project-card').on('click', function (e) {
      if ($(e.target).closest('a').length) return;
      openProjectModal(this);
    });

    $('.project-card').on('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openProjectModal(this);
      }
    });

    $('.project-card a').on('click', function (e) {
      e.stopPropagation();
    });
  })();
</script>
